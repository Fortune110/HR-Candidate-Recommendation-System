server:
  port: 18080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:55434/resume_blueprint_db
    username: rb_user
    password: rb_password
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public

extract:
  service:
    url: ${EXTRACT_SERVICE_URL:http://127.0.0.1:5600}

openai:
  apiKey: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

logging:
  level:
    reactor.netty.http.client: DEBUG
    reactor.core.publisher: WARN
    io.netty.handler.codec: DEBUG
    com.fortune.resumeblueprint: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
