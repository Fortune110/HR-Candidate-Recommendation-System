server:
  port: 18080

spring:
  datasource:
    url: jdbc:postgresql://127.0.0.1:55434/resume_blueprint_db
    username: rb_user
    password: rb_password
  flyway:
    enabled: true
    locations: classpath:db/migration

openai:
  apiKey: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4o-mini}

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
